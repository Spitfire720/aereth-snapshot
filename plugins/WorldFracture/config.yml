messages:
  prefix: "&8[&5Fracture&8]&r "

settings:
  tick-seconds: 5
  signal-cooldown-seconds: 45
  zone-save-seconds: 180
  interaction-feedback-cooldown-seconds: 8
  passive-observation: 0.20
  veiling-pressure:
    STABLE: 0.00
    VEILED: 0.10
    HOLLOWED: 0.25
    UNBOUND: 0.50

world-events:
  enabled: true
  instability-critical: 75.0
  instability-collapse: 100.0
  spawn-vanilla-echoes: true
  vanilla-echo-entity: "ENDERMAN"
  mythicmobs-command-enabled: true
  mythicmobs-command: "mm mobs spawn EchoRemnant 1 %world%,%x%,%y%,%z%"

signals:
  FRACTURE:
    SCAVENGER: "&cThe fracture clicks ahead of collapse."
    BINDER: "&cThe rupture resists your anchor."
    HARVESTER: "&cThe window is narrowing. Value spikes with danger."
    ARCHIVIST: "&cThis break has happened before."
    UNFORMED: "&cThe air tears in uneven pulses."
  ANCHOR:
    SCAVENGER: "&aThe warning quiets too much."
    BINDER: "&aA weak anchor asks to be held."
    HARVESTER: "&aThe reward normalises. The risk slows."
    ARCHIVIST: "&aContinuity gathers around this place."
    UNFORMED: "&aThe world briefly holds its breath."
  DISTORTION:
    SCAVENGER: "&5Two warnings disagree."
    BINDER: "&5The anchor is almost aligned, but not honestly."
    HARVESTER: "&5The timer lies."
    ARCHIVIST: "&5One signal is false. One is old."
    UNFORMED: "&5The same place answers twice."
  MEMORY:
    SCAVENGER: "&bOld traces cling to the surface."
    BINDER: "&bA remembered failure can be stabilized."
    HARVESTER: "&bThe risk belongs to someone before you."
    ARCHIVIST: "&bThe Echo wants to be named."
    UNFORMED: "&bSomething here remembers being whole."
