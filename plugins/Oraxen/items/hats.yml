anubis_head:
  itemname: <gradient:#3948AE:#6699FF>Anubis Head
  material: PAPER
  lore:
  - <#6f737d>» <#D5D6D8>NightVision when worn
  AttributeModifiers:
  - attribute: ARMOR
    amount: 3
    operation: 0
    slot: HEAD
    uuid: c183a462-78dd-4ee3-9813-c88c9338bb5f
    name: oraxen:modifier
    key: oraxen:modifier
  - attribute: ARMOR_TOUGHNESS
    amount: 2
    operation: 0
    slot: HEAD
    uuid: bf939886-be65-410d-91fa-975e9be15d0a
    name: oraxen:modifier
    key: oraxen:modifier
  Pack:
    generate_model: false
    model: default/anubis_head # .json extension is not mandatory
    custom_model_data: 1036
  # before 1.21.2, simply enable hat mechanic
  Components:
    equippable:
      slot: HEAD
  Mechanics:
    armor_effects:
      night_vision:
        amplifier: 0
        ambient: true # Makes potion effect produce more, translucent, particles.
        particles: true # whether this effect has particles or not
        icon: true # whether this effect has an icon or not

