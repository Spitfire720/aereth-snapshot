  material: PAPER
  lore:
  - <#6f737d>» <#D5D6D8>NightVision when worn
  AttributeModifiers:
  - attribute: ARMOR
    amount: 3
    operation: 0
    slot: HEAD
    uuid: 334f0624-9477-4087-ae78-cc52d6a911ac
    name: oraxen:modifier
    key: oraxen:modifier
  - attribute: ARMOR_TOUGHNESS
    amount: 2
    operation: 0
    slot: HEAD
    uuid: 2cb5c890-f02a-44d4-adf6-3c19054c7c71
