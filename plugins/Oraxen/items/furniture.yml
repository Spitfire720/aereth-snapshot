table:
  itemname: <gray>Table
  material: PAPER
  Pack:
    generate_model: false
    model: default/table
    custom_model_data: 1027
  Mechanics:
    furniture:
      type: ITEM_FRAME # Valid types are ITEM_FRAME, GLOW_ITEM_FRAME, ARMOR_STAND, and DISPLAY_ENTITY if server is 1.19.4+
      small: false # Used by ARMOR_STAND furniture; defaults to true for ARMOR_STAND
      armor_stand_properties:
        translation: # or "offset"
          x: 0.0
          y: -1.22
          z: 0.0
        scale: # This will scale the actual model since armor stands can't be scaled.
          x: 1.5
          y: 1.5
          z: 1.5
      barriers:
      - y: 2
      limited_placing:
        roof: false
        floor: true
        wall: false
      lights:
      - 0,0,0 5
      drop:
        silktouch: false
        loots:
        - oraxen_item: table
          probability: 1.0

cart:
  itemname: <gray>Cart
  material: PAPER
  Mechanics:
    furniture:
      type: DISPLAY_ENTITY
      hitboxes:
      - 0,0,0 1.0,1.0
      display_entity_properties:
        display_transform: FIXED
      barrier: true
      limited_placing:
        roof: false
        floor: true
        wall: false
      drop:
        silktouch: false
        loots:
        - oraxen_item: cart
          probability: 1.0
  Pack:
    generate_model: false
    model: default/cart
    custom_model_data: 1028

chair:
  itemname: <gray>Chair
  material: PAPER
  Mechanics:
    furniture:
      type: DISPLAY_ENTITY
      hitboxes:
      - 0,0,0 1.0,2.0
      display_entity_properties:
        display_transform: FIXED
      barrier: true
      limited_placing:
        roof: false
        floor: true
        wall: false
      seats:
      - 0,-1.2,0
      drop:
        silktouch: false
        loots:
        - oraxen_item: chair
          probability: 1.0
  Pack:
    generate_model: false
    model: default/chair
    custom_model_data: 1029

coach:
  itemname: <gray>Coach
  material: PAPER
  Mechanics:
    furniture:
      type: DISPLAY_ENTITY
      display_entity_properties:
        display_transform: FIXED
      barrier: true
      limited_placing:
        roof: false
        floor: true
        wall: false
      barriers:
      - origin
      - z: 1
      - z: 2
      - x: 1
      - x: 1
        z: 1
      - x: 1
        z: 2
      drop:
        silktouch: false
        loots:
        - oraxen_item: coach
          probability: 1.0
  Pack:
    generate_model: false
    model: default/coach
    custom_model_data: 1030

shelf:
  itemname: <gray>Shelf
  material: PAPER
  Mechanics:
    furniture:
      type: ITEM_FRAME
      limited_placing:
        roof: false
        floor: false
        wall: true
        type: DENY
        block_types: []
        block_tags: []
        oraxen_blocks: []
      barrier: false
      drop:
        silktouch: false
        loots:
        - oraxen_item: shelf
          probability: 1.0
  Pack:
    generate_model: false
    model: default/shelf
    custom_model_data: 1031

turntable:
  itemname: <gray>Turntable
  material: PAPER
  Mechanics:
    furniture:
      type: DISPLAY_ENTITY
      limited_placing:
        roof: false
        floor: true
        wall: false
      barrier: true
      lights:
      - 0,0,0 5
      drop:
        silktouch: false
        loots:
        - oraxen_item: turntable
          probability: 1.0
      display_entity_properties:
        scale:
          x: 0.75
          y: 0.75
          z: 0.75
        # Translation allows fine-tuning the exact position of the display entity
        # Values are in blocks (0.1 = 1/10th of a block)
        # Useful for adjusting vertical placement or centering models
        translation:
          x: 0.0
          y: 0.1 # Raise the turntable slightly off the ground
          z: 0.0
      jukebox:
        # NEW: Use active_model instead of active_stage (references Pack.models key)
        active_model: opened
        volume: 1.0
        pitch: 1.0
  Pack:
    generate_model: false
    model: default/turntable_closed
    # NEW: Define additional models inline - no more fake items needed!
    # These are auto-registered as oraxen:turntable/opened, etc.
    models:
      opened: default/turntable_opened
    custom_model_data: 1032

# REMOVED: turtable_active_stage is no longer needed!
# The "opened" model is now defined inline in turntable's Pack.models
