# Crystal Mushroom Block Set
# Animated magical mushroom-wood blocks with glowing effects

# Crystal Mushroom Log - animated bark texture
crystalmush_log:
  itemname: <gradient:#9966FF:#FF66CC>Crystal Mushroom Log
  material: PAPER
  Pack:
    generate_model: true
    parent_model: block/cube_column
    textures:
      side: default/crystalmush/wood_crystalmush_side_anim
      end: default/crystalmush/wood_crystalmush_top_anim
    custom_model_data: 1017
  Mechanics:
    block:
      type: FULL
      block-sounds:
        break-sound: block.wood.break
        place-sound: block.wood.place
      custom-variation: 5
      appearance:
        model: crystalmush_log
      breaking:
      - when:
        - minecraft:iron_axe
        - minecraft:golden_axe
        - minecraft:diamond_axe
        - minecraft:netherite_axe
        hardness: 2
        drops:
        - item: crystalmush_log
          probability: 1.0
        durability:
          add: 0
          remove: 1
      - else: null
        hardness: 4
        drops:
        - item: crystalmush_log
          probability: 1.0
        durability:
          add: 0
          remove: 2

