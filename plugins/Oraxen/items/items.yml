# Backpack
# This backpack is displayed on the player's back when held anywhere in inventory.
# Right-click to open storage. Uses packet-based invisible armor stands for rendering.

leather_backpack:
  itemname: <#8B4513>Leather Backpack
  material: PAPER
  Pack:
    generate_model: false
    model: default/bag
    custom_model_data: 1048
  Mechanics:
    # Storage functionality - right-click to open
    backpack:
      rows: 4
      title: <#8B4513>Leather Backpack
      open_sound: minecraft:item.armor.equip_leather
      close_sound: minecraft:item.armor.equip_leather
    # Cosmetic display on player's back
    backpack_cosmetic:
      slot: INVENTORY # Display when item is anywhere in inventory
      offset:
        x: 0.0
        y: 0.0
        z: 0.0
      scale: 1.0
      view_distance: 48
      hide_in_spectator: true
      hide_while_swimming: true
      hide_while_gliding: true
      small: true
      visible_to_self: true

