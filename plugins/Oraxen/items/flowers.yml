brunnera:
  itemname: <#34d8eb>Brunnera
  material: PAPER
  Pack:
    generate_model: true
    parent_model: block/cross
    textures:
    - default/flowers/brunnera.png
    custom_model_data: 1024
  Mechanics:
    block:
      type: STRING
      block-sounds:
        break-sound: block.grass.break
        place-sound: block.grass.place
      custom-variation: 1
      appearance:
        model: brunnera
      breaking:
      - else: null
        hardness: 2
        drops:
        - item: brunnera
          probability: 1.0

