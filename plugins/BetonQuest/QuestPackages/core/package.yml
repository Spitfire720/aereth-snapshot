# =====================================================
# CORE QUEST PACKAGE — PHASE 1–4 (FIXED & VALID)
# =====================================================
# This file defines EXISTENTIAL PROGRESSION STATE.
#
# IMPORTANT:
# - CONDITIONS are ONLY checked
# - EVENTS are ONLY executed
# - `if` syntax = if <conditions> <event> else <event>
#
# This file has been corrected to respect BetonQuest rules
# WITHOUT removing any system or design intent.
# =====================================================

name: core
author: SpitFire720
version: 4.1-fixed

# =====================================================
# CONDITIONS (READ-ONLY)
# =====================================================
conditions:

  # -------- LEVEL CHECKS --------
  lvl1:  "point level 1"
  lvl5:  "point level 5"
  lvl10: "point level 10"
  lvl15: "point level 15"
  lvl20: "point level 20"
  lvl30: "point level 30"
  lvl45: "point level 45"
  lvl60: "point level 60"

  # -------- XP THRESHOLDS --------
  # These are PLACEHOLDERS for the real curve
  xp10:  "point xp 10"
  xp25:  "point xp 25"
  xp45:  "point xp 45"
  xp70:  "point xp 70"
  xp100: "point xp 100"
  xp140: "point xp 140"
  xp180: "point xp 180"
  xp220: "point xp 220"

  # -------- AWAKENINGS --------
  awaken1: "tag awaken_emergence"
  awaken2: "tag awaken_stabilization"
  awaken3: "tag awaken_assertion"
  awaken4: "tag awaken_distortion"
  awaken5: "tag awaken_singularity"

  # -------- INSTABILITY --------
  unstable25: "point instability 25"
  unstable50: "point instability 50"

# =====================================================
# EVENTS (STATE MUTATION)
# =====================================================
events:

  # -------------------------------------------------
  # XP ENTRY
  # -------------------------------------------------
  addXpSmall: "point xp +5 checkLevel"

  # -------------------------------------------------
  # LEVEL ROUTER
  # -------------------------------------------------
  checkLevel: "if lvl60 capReached else routeXP"
  routeXP: "folder tier1 tier2 tier3 tier4 tier5 tier6 tier7 tier8"

  # -------------------------------------------------
  # XP TIERS
  # NOTE:
  # Conditions are checked INSIDE `if`
  # Only EVENTS are executed
  # -------------------------------------------------

  tier1: "if xp10 tier1Up else nothing"
  tier1Up: "folder levelUp10 awakenCheck"

  tier2: "if xp25 tier2Up else nothing"
  tier2Up: "folder levelUp25 awakenCheck"

  tier3: "if xp45 tier3Up else nothing"
  tier3Up: "folder levelUp45 awakenCheck"

  tier4: "if xp70 tier4Up else nothing"
  tier4Up: "folder levelUp70 awakenCheck"

  tier5: "if xp100 tier5Up else nothing"
  tier5Up: "folder levelUp100 awakenCheck"

  tier6: "if xp140 tier6Up else nothing"
  tier6Up: "folder levelUp140 awakenCheck"

  tier7: "if xp180 tier7Up else nothing"
  tier7Up: "folder levelUp180 awakenCheck"

  tier8: "if xp220 tier8Up else nothing"
  tier8Up: "folder levelUp220 awakenCheck"

  # -------------------------------------------------
  # LEVEL UPS
  # -------------------------------------------------
  levelUp10:  "point level +1 point xp -10 grantStats notifyLevel"
  levelUp25:  "point level +1 point xp -25 grantStats notifyLevel"
  levelUp45:  "point level +1 point xp -45 grantStats notifyLevel"
  levelUp70:  "point level +1 point xp -70 grantStats notifyLevel"
  levelUp100: "point level +1 point xp -100 grantStats notifyLevel"
  levelUp140: "point level +1 point xp -140 grantStats notifyLevel"
  levelUp180: "point level +1 point xp -180 grantStats notifyLevel"
  levelUp220: "point level +1 point xp -220 grantStats notifyLevel"

  # -------------------------------------------------
  # STAT GRANTS (HORIZONTAL)
  # -------------------------------------------------
  grantStats: "folder statCore statFlavor"

  statCore: "point stability +1 point vitality +1"
  statFlavor: "point force +1 point agility +1 point attunement +1 point perception +1 point nullity +1"

  # -------------------------------------------------
  # AWAKENINGS
  # -------------------------------------------------
  awakenCheck: "folder awaken1Check awaken2Check awaken3Check awaken4Check awaken5Check"

  awaken1Check: "if lvl1 awaken1Event else nothing"
  awaken2Check: "if lvl10 awaken2Event else nothing"
  awaken3Check: "if lvl20 awaken3Event else nothing"
  awaken4Check: "if lvl30 awaken4Event else nothing"
  awaken5Check: "if lvl45 awaken5Event else nothing"

  awaken1Event: "folder tagEmergence intentSlot1 titleDrifter"
  awaken2Event: "folder tagStabilization intentSlot2 titleAnchored"
  awaken3Event: "folder tagAssertion intentSlot3 titleReclaimer"
  awaken4Event: "folder tagDistortion titleDistorter"
  awaken5Event: "folder tagSingularity titleSingularity"

  # -------------------------------------------------
  # TAGS
  # -------------------------------------------------
  tagEmergence:     "tag add awaken_emergence"
  tagStabilization: "tag add awaken_stabilization"
  tagAssertion:     "tag add awaken_assertion"
  tagDistortion:    "tag add awaken_distortion"
  tagSingularity:   "tag add awaken_singularity"

  # -------------------------------------------------
  # INTENT SLOTS
  # -------------------------------------------------
  intentSlot1: "point intent_slots +1 notify Intent Slot Unlocked"
  intentSlot2: "point intent_slots +1 notify Second Intent Slot Unlocked"
  intentSlot3: "point intent_slots +1 notify Third Intent Slot Unlocked"

  # -------------------------------------------------
  # TITLES
  # -------------------------------------------------
  titleDrifter:     "tag add title_drifter notify You exist, but barely"
  titleAnchored:    "tag add title_anchored notify Reality remembers you"
  titleReclaimer:   "tag add title_reclaimer notify The world reacts to you"
  titleDistorter:   "tag add title_distorter notify Reality resists you"
  titleSingularity: "tag add title_singularity notify You are an anomaly"

  # -------------------------------------------------
  # DEATH / PRESSURE / INSTABILITY
  # -------------------------------------------------
  onDeath: "if lvl15 deathPenalty else noDeathPenalty"
  noDeathPenalty: "notify No XP lost (Emergence Phase)"

  deathPenalty: "folder pressureGain instabilityGain xpLoss"
  pressureGain: "point pressure +1 notify Pressure rises"
  instabilityGain: "point instability +1 notify Instability rises"
  xpLoss: "point xp -10 notify Fragment instability detected"

  # -------------------------------------------------
  # WORLD REACTION
  # -------------------------------------------------
  worldReaction: "if unstable25 raiseThreat else nothing"
  raiseThreat: "point threat_weight +1 notify The world takes notice"

  worldAlertCheck: "if unstable50 worldAlert else nothing"
  worldAlert: "tag add world_alert notify Reality destabilizes nearby"

  # -------------------------------------------------
  # SAFETY
  # -------------------------------------------------
  notifyLevel: "notify Fragment Level Increased io:Title sound:entity_player_levelup"
  capReached: "notify Maximum Fragment Level Reached io:Title"
  nothing: "tag add noop"

# =====================================================
# OBJECTIVES
# =====================================================
objectives:
  killZombie: "mobkill ZOMBIE 1 events:addXpSmall global"
